server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /calc {
        return 301 /calc/;
    }

    location ^~ /calc/ {
        try_files $uri $uri/ /calc/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
